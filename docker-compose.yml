services:
  database:
    container_name: database
    image: mariadb # Because it's got less problematic Arm64 support
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: app
      MYSQL_USER: symfony
      MYSQL_PASSWORD: ChangeMe
    volumes:
      - ./docker/data/mariadb:/var/lib/mysql:rw
    ports:
      # Local port chosen by https://www.random.org/integers/?num=1&min=5001&max=49151&col=5&base=10&format=html&rnd=new
      - "23281:3306"
